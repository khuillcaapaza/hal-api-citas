name: Deploy API (hal-api-citas)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  # Rutas en el servidor HestiaCP (usuario haladminweb)
  PRIVATE_PATH: /home/haladminweb/web/citas.hospitalantoniolorena.gob.pe/private/api
  PUBLIC_API_PATH: /home/haladminweb/web/citas.hospitalantoniolorena.gob.pe/public_html/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          extensions: pdo, pdo_mysql, mbstring, zip

      - name: Instalar dependencias (producción)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Crear carpetas remotas si no existen
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ env.PRIVATE_PATH }}' '${{ env.PUBLIC_API_PATH }}'"

      - name: Desplegar código de la API a private/ (fuera del web root)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.DEPLOY_PORT }}" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'deploy' \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'logs' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.PRIVATE_PATH }}/"

      - name: Desplegar front controller a public_html/api/
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.DEPLOY_PORT }}" \
            ./deploy/public_html-api/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.PUBLIC_API_PATH }}/"
